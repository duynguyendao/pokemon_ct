name: Build Unsigned iOS IPA

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Set build version
        id: version
        run: |
          BASE=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          BUILD=${{ github.run_number }}
          echo "base=${BASE}" >> $GITHUB_OUTPUT
          echo "build=${BUILD}" >> $GITHUB_OUTPUT
          echo "tag=v${BASE}-b${BUILD}" >> $GITHUB_OUTPUT
          echo "ipa=PokemonCT_v${BASE}_b${BUILD}.ipa" >> $GITHUB_OUTPUT

      - name: Build iOS App (Unsigned)
        env:
          CODE_SIGNING_ALLOWED: "NO"
        run: |
          flutter build ios --release --no-codesign \
            --build-name=${{ steps.version.outputs.base }} \
            --build-number=${{ steps.version.outputs.build }}

      - name: Create IPA
        run: |
          rm -rf Payload
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          ditto -c -k --keepParent Payload "${{ steps.version.outputs.ipa }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.tag }}
          path: ${{ steps.version.outputs.ipa }}
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "PokemonCT ${{ steps.version.outputs.base }} (build ${{ steps.version.outputs.build }})"
          body: |
            **Cách cài qua Feather:**
            1. Nhấn vào file `.ipa` bên dưới → Copy link
            2. Mở Feather trên iPhone → Install from URL → Dán link vào
          files: ${{ steps.version.outputs.ipa }}
          make_latest: true
